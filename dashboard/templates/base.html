<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard{% endblock %} — Predictions Sandbox</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
        .stat-card { text-align: center; }
        .stat-card h3 { margin-bottom: 0.25rem; font-size: 1.8rem; }
        .stat-card small { opacity: 0.7; }
        .edge-pos { color: #4caf50; }
        .edge-neg { color: #f44336; }
        .tag { display: inline-block; padding: 0.1rem 0.5rem; margin: 0.1rem; font-size: 0.8rem; border-radius: 4px; background: var(--pico-secondary-background); }
        nav ul li { font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong>Predictions Sandbox</strong></li>
        </ul>
        <ul>
            <li><a href="/">Overview</a></li>
            <li><a href="/markets">Markets</a></li>
            <li><a href="/calibration">Calibration</a></li>
            <li><a href="/trades">Trades</a></li>
            <li><a href="/costs">Costs</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Predictions Sandbox — Read-only dashboard</small>
    </footer>
</body>
</html>
